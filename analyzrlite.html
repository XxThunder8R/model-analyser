<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>analyzrlite</title>
</head>
<body>

<h1>analyzrlite - inspired by rbxm2sl by axo</h1>

<label>paste the model id here:</label><br>
<input type="text" id="modelId" placeholder="model id"><br><br>

<button onclick="analyzemodel()">submit</button>

<p id="status"></p>
<pre id="result"></pre>

<script>
const WORKER_URL = "https://analyzerlite.esinoneh.workers.dev";

async function analyzemodel() {
    const id = document.getElementById("modelId").value.trim();

    if (!id) {
        alert("please enter a model id!");
        return;
    }

    document.getElementById("status").innerText = "scanning...";
    document.getElementById("result").innerText = "";

    try {
        const res = await fetch(`${WORKER_URL}/analyze?id=${id}`);
        const data = await res.json();

        document.getElementById("status").innerText = "scan complete!";

        document.getElementById("result").innerText =
`model id: ${data.id || id}

parts: ${data.parts}
localscripts: ${data.localscripts}
modulescripts: ${data.modulescripts}
serverscripts: ${data.serverscripts}

risk: ${data.risk}

${data.message}`;
    } catch (e) {
        document.getElementById("status").innerText = "scan failed!";
        document.getElementById("result").innerText =
"high risk: worker not reachable or network error.";
    }
}
</script>

</body>
</html>
